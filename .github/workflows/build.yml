name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish ConnectDNS.csproj -c Release -r win-x64 --self-contained true -o ./publish

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/ConnectDNS.exe